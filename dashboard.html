<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>NutriSnap - Dashboard</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1 id="usernameDisplay">Bem-vindo, Usuário</h1>
    <div id="streak" class="streak"></div>

    <h2>Ranking</h2>
    <ul id="rankingList"></ul>

    <h2>Histórico de Refeições</h2>
    <ul id="mealHistory"></ul>

    <h2>Planos</h2>
    <button onclick="goPage('payment')">Assinar / Alterar Plano</button>
  </div>

  <script src="frontend.js"></script>
  <script>
    const currentUser = {email:"teste@teste.com",username:"Usuário"}; // substituir login real

    document.getElementById("usernameDisplay").innerText = `Bem-vindo, ${currentUser.username}`;

    // Mock streak
    animateStreak(5,currentUser.username);

    // Ranking fetch
    async function updateRanking(){
      const res = await fetch("/api/ranking");
      const data = await res.json();
      const list = document.getElementById("rankingList");
      list.innerHTML="";
      data.forEach(u=>{
        const li = document.createElement("li");
        li.textContent = `#${u.rank} - ${u.username} | ${u.totalCalories} kcal | ${u.streak} dias`;
        list.appendChild(li);
      });
    }

    // Histórico de refeição (mock)
    async function updateHistory(){
      const res = await fetch("/api/meal/analyze",{method:"POST",body:JSON.stringify({email:currentUser.email,image_url:""})});
      const data = await res.json();
      const history = document.getElementById("mealHistory");
      history.innerHTML="";
      currentUser.history = currentUser.history||[];
      currentUser.history.forEach(h=>{
        const li = document.createElement("li");
        li.textContent = `${h.date.toLocaleDateString()} - ${h.calories} kcal`;
        history.appendChild(li);
      });
    }

    updateRanking();
    updateHistory();
  </script>
</body>
</html>
