<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>NutriSnap Ultra MAX PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Roboto',sans-serif;}
body{background:linear-gradient(135deg,#6b5b95,#feb236);min-height:100vh;display:flex;justify-content:center;align-items:center;transition:0.5s;}
.container{background:rgba(255,255,255,0.08);backdrop-filter:blur(15px);border-radius:25px;width:500px;max-width:95%;padding:35px;color:#fff;text-align:center;box-shadow:0 15px 50px rgba(0,0,0,0.5);transition:0.5s;}
h1,h2{margin-bottom:20px;font-weight:700;}
input{width:100%;padding:14px;margin:12px 0;border-radius:10px;border:none;outline:none;font-size:16px;}
button{width:100%;padding:14px;border:none;border-radius:10px;background:#ff7f50;color:#fff;font-weight:700;font-size:16px;cursor:pointer;transition:0.3s;}
button:hover{background:#ff5722;}
a{color:#00ffff;text-decoration:underline;cursor:pointer;font-weight:bold;}
.section{display:none;opacity:0;transition:0.5s;}
.active{display:block;opacity:1;}
/* HOME AVANÇADO */
.home{display:flex;flex-direction:column;gap:20px;text-align:left;}
.menu{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:10px;}
.menu button{background:#6a1b9a;display:flex;align-items:center;gap:8px;justify-content:center;}
.menu button i{font-size:18px;}
.menu button:hover{background:#ab47bc;}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:15px;margin-top:15px;}
.card{background:rgba(255,255,255,0.2);padding:15px;border-radius:15px;cursor:pointer;transition:0.3s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px;}
.card:hover{background:rgba(255,255,255,0.35);}
.card i{font-size:30px;}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:flex;justify-content:center;align-items:center;opacity:0;pointer-events:none;transition:0.3s;}
.modal.active{opacity:1;pointer-events:auto;}
.modal-content{background:#222;padding:25px;border-radius:20px;width:400px;max-width:90%;text-align:center;position:relative;}
.close{position:absolute;top:15px;right:15px;cursor:pointer;font-size:20px;color:#fff;}
canvas{background:#fff;border-radius:15px;padding:10px;}
.stat{background:rgba(255,255,255,0.15);padding:15px;border-radius:12px;display:flex;justify-content:space-between;align-items:center;font-size:16px;font-weight:700;transition:0.3s;}
.stat:hover{background:rgba(255,255,255,0.3);}
.streak{margin-top:10px;font-weight:700;font-size:16px;color:#ffeb3b;}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="container section active" id="loginDiv">
  <h1>NutriSnap Ultra MAX</h1>
  <input id="email" type="text" placeholder="Email">
  <input id="password" type="password" placeholder="Senha">
  <button onclick="loginUser()"><i class="fas fa-sign-in-alt"></i> Entrar</button>
  <p>Não tem conta? <a onclick="showRegister()">Registrar</a></p>
</div>

<!-- REGISTRO -->
<div class="container section" id="registerDiv">
  <h1>Registrar</h1>
  <input id="regEmail" type="text" placeholder="Email">
  <input id="regPassword" type="password" placeholder="Senha">
  <button onclick="registerUser()"><i class="fas fa-user-plus"></i> Criar Conta</button>
  <p>Já tem conta? <a onclick="showLogin()">Login</a></p>
</div>

<!-- HOME -->
<div class="container section" id="homeDiv">
  <h1>Bem-vindo, <span id="userName">Usuário</span>!</h1>
  <div class="streak" id="streakText"></div>
  <div class="menu">
    <button onclick="showCards('planos')"><i class="fas fa-utensils"></i> Planos</button>
    <button onclick="showCards('peso')"><i class="fas fa-weight"></i> Peso</button>
    <button onclick="showCards('estatisticas')"><i class="fas fa-chart-line"></i> Estatísticas</button>
    <button onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sair</button>
  </div>
  <div class="cards" id="cardsDiv"></div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <h2 id="modalTitle"></h2>
    <canvas id="modalChart" width="350" height="200"></canvas>
  </div>
</div>

<script>
let streak=0;
let currentUser=null;

// LOGIN/REG
function showLogin(){document.getElementById('registerDiv').classList.remove('active'); document.getElementById('homeDiv').classList.remove('active'); document.getElementById('loginDiv').classList.add('active');}
function showRegister(){document.getElementById('loginDiv').classList.remove('active'); document.getElementById('homeDiv').classList.remove('active'); document.getElementById('registerDiv').classList.add('active');}

// LOGIN SIMULADO
function loginUser(){
  const email=document.getElementById('email').value;
  const password=document.getElementById('password').value;
  if(!email||!password){alert('Preencha todos os campos!'); return;}
  currentUser={email,streak:localStorage.getItem(email+'_streak')||0};
  document.getElementById('userName').innerText=email.split('@')[0];
  streak=parseInt(currentUser.streak);
  updateStreak();
  document.getElementById('loginDiv').classList.remove('active');
  document.getElementById('homeDiv').classList.add('active');
}

// REGISTRO SIMULADO
function registerUser(){
  const email=document.getElementById('regEmail').value;
  const password=document.getElementById('regPassword').value;
  if(!email||!password){alert('Preencha todos os campos!'); return;}
  alert('Conta criada com sucesso!');
  showLogin();
}

// LOGOUT
function logout(){alert('Você saiu!'); currentUser=null; showLogin();}

// STREAK
function updateStreak(){document.getElementById('streakText').innerText=`Seu streak: ${streak} dias`;}

// CARDS AVANÇADOS
function showCards(tipo){
  const cardsDiv=document.getElementById('cardsDiv'); cardsDiv.innerHTML='';
  let items=[];
  if(tipo==='planos'){items=[{name:'Café da Manhã',icon:'fas fa-coffee'},{name:'Almoço',icon:'fas fa-hamburger'},{name:'Jantar',icon:'fas fa-leaf'}];}
  if(tipo==='peso'){items=[{name:'Peso Atual',icon:'fas fa-weight'},{name:'Meta',icon:'fas fa-bullseye'},{name:'IMC',icon:'fas fa-heartbeat'}];}
  if(tipo==='estatisticas'){items=[{name:'Calorias',icon:'fas fa-fire'},{name:'Proteínas',icon:'fas fa-drumstick-bite'},{name:'Carbs',icon:'fas fa-bread-slice'}];}

  items.forEach(i=>{
    const card=document.createElement('div'); card.className='card'; 
    card.innerHTML=`<i class="${i.icon}"></i><span>${i.name}</span>`;
    card.onclick=()=>openModal(i.name);
    cardsDiv.appendChild(card);
  });
}

// MODAL COM CHART
function openModal(title){
  document.getElementById('modalTitle').innerText=title;
  document.getElementById('modal').classList.add('active');
  const ctx=document.getElementById('modalChart').getContext('2d');
  if(window.myChart) window.myChart.destroy();
  window.myChart=new Chart(ctx,{
    type:'bar',
    data:{
      labels:['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'],
      datasets:[{label:title,data:Array.from({length:7},()=>Math.floor(Math.random()*100+50)),backgroundColor:'#ff7f50'}]
    },
    options:{responsive:true,plugins:{legend:{display:false}}}
  });
}
function closeModal(){document.getElementById('modal').classList.remove('active');}

// INCREMENTA STREAK AO CLICAR EM CARD
document.addEventListener('click', e=>{
  if(e.target.closest('.card') && currentUser){
    streak++;
    localStorage.setItem(currentUser.email+'_streak',streak);
    updateStreak();
  }
});
</script>
</body>
</html>
