<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>NutriSnap - Análise de Refeição</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Analisar Refeição</h1>
    <input type="text" id="mealImage" placeholder="URL da refeição">
    <button onclick="analyzeMeal()">Analisar</button>
    <div id="mealResult"></div>
  </div>

  <script src="frontend.js"></script>
  <script>
    async function analyzeMeal(){
      const url = document.getElementById("mealImage").value;
      const res = await fetch("/api/meal/analyze",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({email:"teste@teste.com",image_url:url})
      });
      const data = await res.json();
      document.getElementById("mealResult").innerHTML = `
        <p>Calorias: ${data.calories} kcal</p>
        <p>Proteínas: ${data.protein} g</p>
        <p>Carbs: ${data.carbs} g</p>
        <p>Gorduras: ${data.fat} g</p>
        <p>${data.streakMessage}</p>
      `;
    }
  </script>
</body>
</html>
