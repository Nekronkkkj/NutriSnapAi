<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>NutriSnap - Pagamento</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Escolha seu Plano</h1>
    <select id="planSelect">
      <option value="basic_weekly">Básico Semanal - R$7,90</option>
      <option value="premium_weekly">Premium Semanal - R$10,90</option>
      <option value="basic_monthly">Básico Mensal - R$31,90</option>
      <option value="premium_monthly">Premium Mensal - R$47,90</option>
      <option value="premium_monthly">Básico Anual - R$94,90</option>
      <option value="premium_yearly">Premium Anual - R$139,00</option>
    </select>
    <button onclick="requestPayment()">Gerar Link de Pagamento</button>
    <div id="paymentLink"></div>
  </div>

  <script src="frontend.js"></script>
  <script>
    async function requestPayment(){
      const plan = document.getElementById("planSelect").value;
      const res = await fetch("/api/payment/request",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({email:"teste@teste.com",plan})
      });
      const data = await res.json();
      const linkDiv = document.getElementById("paymentLink");
      linkDiv.innerHTML = `<a href="${data.link}" target="_blank">Clique aqui para pagar</a>`;
    }
  </script>
</body>
</html>
